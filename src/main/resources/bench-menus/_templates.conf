#invisible
#
# Shared snippets used by bench-menus.
# `#invisible` keeps this file out of the menu loader; it is only included by
# other configs via `include required(file("./plugins/AbstractMenus/menus/_templates.conf"))`.
#

# ----- Sound presets -----
# Paper 1.21 resolves sounds through the Registry by namespaced key
# (lowercase with dots). The old Bukkit enum form (BLOCK_NOTE_BLOCK_CHIME)
# is rejected by NamespacedKey.fromString on 1.21+.
clickSound:    "ui.button.click"
successSound:  "block.note_block.chime"
failSound:     "entity.villager.no"
openSound:     "block.ender_chest.open"
closeSound:    "block.chest.close"

# ----- Action snippets -----
denyNoMoney {
  message: "&cНе хватает денег"
  sound: ${failSound}
}
denyNoPerm {
  message: "&cНет доступа"
  sound: ${failSound}
}

# ----- Common items -----
border {
  material: BLACK_STAINED_GLASS_PANE
  name: " "
  click {}
}
borderRed = ${border} {
  material: RED_STAINED_GLASS_PANE
}
borderGreen = ${border} {
  material: LIME_STAINED_GLASS_PANE
}
borderBlue = ${border} {
  material: BLUE_STAINED_GLASS_PANE
}
borderYellow = ${border} {
  material: YELLOW_STAINED_GLASS_PANE
}

closeButton {
  texture: "5a6787ba32564e7c2f3a0ce64498ecbb23b89845e5a66b5cec7736f729ed37"
  name: "&cЗакрыть"
  lore: "&7Нажмите чтобы закрыть меню"
  click {
    closeMenu: true
    sound: ${closeSound}
  }
}

backButton {
  texture: "bd69e06e5dadfd84e5f3d1c21063f2553b2fa945ee1d4d7152fdc5425bc12a9"
  name: "&cНазад"
  click {
    sound: ${clickSound}
  }
}

balanceIcon {
  texture: "a9b906b2155f193787042338d05f840391c05a6d3e81623901b296bee3ffdd2"
  name: "&fБаланс: &e%vault_eco_balance%"
  lore: "&7Кошелёк игрока"
}
