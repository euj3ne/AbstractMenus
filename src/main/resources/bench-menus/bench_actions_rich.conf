#
# Bench G — items with rich click-action chains.
# Stresses Actions dispatch (Actions.activate iterates list of Action objects).
# Also exercises ActionPropertySet/ActionPropertyRemove which trigger CoW.
#
# Open: /am open bench_actions_rich
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&dBench G — Action chains"
size: 6

activators {
  command: "bench_actions_rich"
}

items: [
  # Multiple actions per click
  {
    slot: 0
    material: TNT
    name: "&cMulti-step"
    lore: ["&7sound + message + close + delay + cmd"]
    click {
      sound: ${clickSound}
      message: "&aStep 1: you clicked"
      delay {
        ticks: 20
        actions {
          message: "&aStep 2: one second passed"
          sound: ${successSound}
        }
      }
      closeMenu: true
    }
  },

  # Per-button click types
  {
    slot: 1
    material: REDSTONE_LAMP
    name: "&fClick variants"
    lore: [
      "&7Left click — success sound"
      "&7Right click — fail sound"
      "&7Shift+Left — close"
      "&7Q (drop) — broadcast"
    ]
    click {
      left  { sound: ${successSound}, message: "&aLeft click" }
      right { sound: ${failSound},    message: "&cRight click" }
      shift_left { closeMenu: true }
      drop { broadcast: "&e%player_name% &7pressed drop in the menu" }
    }
  },

  # Random actions — dispatch cost (uniform distribution over list items)
  {
    slot: 2
    material: ENCHANTING_TABLE
    name: "&5Random outcome"
    lore: ["&7One of four effects, randomly"]
    click {
      randActions: [
        { sound: "entity.player.levelup",  message: "&aLucky!" }
        { sound: "entity.villager.no",     message: "&cNo." }
        { sound: "block.note_block.chime", message: "&eFlash" }
        { sound: "entity.zombie.ambient",  message: "&8Silence..." }
      ]
    }
  },

  # Bulk action — runs nested actions in sequence
  {
    slot: 3
    material: HOPPER
    name: "&7Bulk pipe"
    lore: ["&7sound → message → message → sound"]
    click {
      bulk: [
        { sound: ${clickSound}    }
        { message: "&aFirst line" }
        { message: "&7Second line" }
        { sound: ${successSound}  }
      ]
    }
  },

  # Property mutation — CoW path
  {
    slot: 4
    material: STONE
    name: "&7Change me"
    lore: ["&7Click — name+lore change"]
    click {
      setProperty {
        name: "&aChanged!"
        lore: ["&aAfter click", "&7Refresh reverts to original"]
      }
      refreshItem: true
      sound: ${clickSound}
    }
  },
  {
    slot: 5
    material: BARRIER
    name: "&cRemove property"
    lore: ["&7click → remProperty(material)"]
    click {
      remProperty: ["material"]
      refreshItem: true
      sound: ${failSound}
    }
  },

  # Variable mutations
  {
    slot: 9
    material: PAPER
    name: "&fCounter &7• &e%varp_clicks%"
    lore: ["&7Personal var — incremented per click"]
    click {
      incVarp: ["clicks::1"]
      refreshItem: true
      sound: ${clickSound}
    }
  },
  {
    slot: 10
    material: PAPER
    name: "&fReset counter"
    lore: ["&7removeVarp(clicks)"]
    click {
      removeVarp: ["clicks"]
      refreshItem: true
      sound: ${failSound}
    }
  },
  {
    slot: 11
    material: REDSTONE
    name: "&cGlobal counter &7• &e%var_total_clicks%"
    lore: ["&7Visible to everyone"]
    click {
      incVar: ["total_clicks::1"]
      refreshItem: true
      sound: ${clickSound}
    }
  },

  # Open another menu from this one
  {
    slot: 18
    material: COMPASS
    name: "&fOpen Bench A"
    click { openMenu: "bench_static_grid" }
  },
  {
    slot: 19
    material: COMPASS
    name: "&fOpen Bench B"
    click { openMenu: "bench_dynamic_lore" }
  },
  {
    slot: 20
    material: COMPASS
    name: "&fOpen Bench C"
    click { openMenu: "bench_animated_carousel" }
  },

  # Sound / message variants
  {
    slot: 27
    material: NOTE_BLOCK
    name: "&dSound with pitch"
    click {
      sound { name: "block.note_block.bell", pitch: 1.5, volume: 1.0 }
    }
  },
  {
    slot: 28
    material: BOOK
    name: "&fMiniMessage in click"
    click {
      miniMessage: "<rainbow>Rainbow message</rainbow>"
    }
  },

  ${closeButton} { slot: 49 }
]
