#
# Bench G — items with rich click-action chains.
# Stresses Actions dispatch (Actions.activate iterates list of Action objects).
# Also exercises ActionPropertySet/ActionPropertyRemove which trigger CoW.
#
# Open: /am open bench_actions_rich
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&dBench G — Action chains"
size: 6

activators {
  command: "bench_actions_rich"
}

items: [
  # Multiple actions per click
  {
    slot: 0
    material: TNT
    name: "&cMulti-step"
    lore: ["&7sound + message + close + delay + cmd"]
    click {
      sound: ${clickSound}
      message: "&aШаг 1: вы кликнули"
      delay {
        ticks: 20
        actions {
          message: "&aШаг 2: прошла секунда"
          sound: ${successSound}
        }
      }
      closeMenu: true
    }
  },

  # Per-button click types
  {
    slot: 1
    material: REDSTONE_LAMP
    name: "&fРазные клики"
    lore: [
      "&7ЛКМ — звук success"
      "&7ПКМ — звук fail"
      "&7Shift+ЛКМ — закрыть"
      "&7Q (drop) — broadcast"
    ]
    click {
      left  { sound: ${successSound}, message: "&aLeft click" }
      right { sound: ${failSound},    message: "&cRight click" }
      shift_left { closeMenu: true }
      drop { broadcast: "&e%player_name% &7нажал drop в меню" }
    }
  },

  # Random actions — dispatch cost (uniform distribution over list items)
  {
    slot: 2
    material: ENCHANTING_TABLE
    name: "&5Random outcome"
    lore: ["&7Один из 4 эффектов случайно"]
    click {
      randActions: [
        { sound: "entity.player.levelup",  message: "&aУдача!" }
        { sound: "entity.villager.no",     message: "&cНет." }
        { sound: "block.note_block.chime", message: "&eВспышка" }
        { sound: "entity.zombie.ambient",  message: "&8Тишина..." }
      ]
    }
  },

  # Bulk action — runs nested actions in sequence
  {
    slot: 3
    material: HOPPER
    name: "&7Bulk pipe"
    lore: ["&7sound → message → message → sound"]
    click {
      bulk: [
        { sound: ${clickSound}    }
        { message: "&aПервая строка" }
        { message: "&7Вторая строка" }
        { sound: ${successSound}  }
      ]
    }
  },

  # Property mutation — CoW path
  {
    slot: 4
    material: STONE
    name: "&7Меняй меня"
    lore: ["&7Click — name+lore меняются"]
    click {
      setProperty {
        name: "&aИзменено!"
        lore: ["&aПосле клика", "&7Refresh вернёт исходный"]
      }
      refreshItem: true
      sound: ${clickSound}
    }
  },
  {
    slot: 5
    material: BARRIER
    name: "&cУдали свойство"
    lore: ["&7click → remProperty(material)"]
    click {
      remProperty: ["material"]
      refreshItem: true
      sound: ${failSound}
    }
  },

  # Variable mutations
  {
    slot: 9
    material: PAPER
    name: "&fСчётчик &7• &e%varp_clicks%"
    lore: ["&7Personal var — увеличивается каждый клик"]
    click {
      incVarp { name: "clicks", by: 1 }
      refreshItem: true
      sound: ${clickSound}
    }
  },
  {
    slot: 10
    material: PAPER
    name: "&fСбросить счётчик"
    lore: ["&7removeVarp(clicks)"]
    click {
      removeVarp: "clicks"
      refreshItem: true
      sound: ${failSound}
    }
  },
  {
    slot: 11
    material: REDSTONE
    name: "&cГлобальный счётчик &7• &e%var_total_clicks%"
    lore: ["&7Видно всем игрокам"]
    click {
      incVar { name: "total_clicks", by: 1 }
      refreshItem: true
      sound: ${clickSound}
    }
  },

  # Open another menu from this one
  {
    slot: 18
    material: COMPASS
    name: "&fОткрыть Bench A"
    click { openMenu: "bench_static_grid" }
  },
  {
    slot: 19
    material: COMPASS
    name: "&fОткрыть Bench B"
    click { openMenu: "bench_dynamic_lore" }
  },
  {
    slot: 20
    material: COMPASS
    name: "&fОткрыть Bench C"
    click { openMenu: "bench_animated_carousel" }
  },

  # Sound / message variants
  {
    slot: 27
    material: NOTE_BLOCK
    name: "&dЗвук с pitch"
    click {
      sound { name: "block.note_block.bell", pitch: 1.5, volume: 1.0 }
    }
  },
  {
    slot: 28
    material: BOOK
    name: "&fMiniMessage в click"
    click {
      miniMessage: "<rainbow>Радужное сообщение</rainbow>"
    }
  },

  ${closeButton} { slot: 49 }
]
