#
# Bench C — animated 8-frame carousel running every tick.
# Stresses the AnimatedMenu/Frame path: every tick a new frame plays, items
# are cloned, built, placed. After the AnimatedMenu fix, items are built
# once per frame (not twice).
#
# Open: /am open bench_animated_carousel
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&6Bench C — Animated carousel"
size: 3
loop: true

activators {
  command: "bench_animated_carousel"
}

# Reusable item snippets used across frames
diamond { material: DIAMOND,      name: "&bDiamond" }
emerald { material: EMERALD,      name: "&aEmerald" }
ruby    { material: REDSTONE,     name: "&cRuby"    }
gold    { material: GOLD_INGOT,   name: "&6Gold"    }
iron    { material: IRON_INGOT,   name: "&fIron"    }
coal    { material: COAL,         name: "&8Coal"    }
lapis   { material: LAPIS_LAZULI, name: "&9Lapis"   }

frames: [
  { delay: 1, clear: false, items: [
    ${diamond}{slot:10}, ${emerald}{slot:11}, ${ruby}{slot:12}, ${gold}{slot:13},
    ${iron}{slot:14},    ${coal}{slot:15},    ${lapis}{slot:16}
  ] },
  { delay: 1, clear: false, items: [
    ${lapis}{slot:10},   ${diamond}{slot:11}, ${emerald}{slot:12}, ${ruby}{slot:13},
    ${gold}{slot:14},    ${iron}{slot:15},    ${coal}{slot:16}
  ] },
  { delay: 1, clear: false, items: [
    ${coal}{slot:10},    ${lapis}{slot:11},   ${diamond}{slot:12}, ${emerald}{slot:13},
    ${ruby}{slot:14},    ${gold}{slot:15},    ${iron}{slot:16}
  ] },
  { delay: 1, clear: false, items: [
    ${iron}{slot:10},    ${coal}{slot:11},    ${lapis}{slot:12},   ${diamond}{slot:13},
    ${emerald}{slot:14}, ${ruby}{slot:15},    ${gold}{slot:16}
  ] },
  { delay: 1, clear: false, items: [
    ${gold}{slot:10},    ${iron}{slot:11},    ${coal}{slot:12},    ${lapis}{slot:13},
    ${diamond}{slot:14}, ${emerald}{slot:15}, ${ruby}{slot:16}
  ] },
  { delay: 1, clear: false, items: [
    ${ruby}{slot:10},    ${gold}{slot:11},    ${iron}{slot:12},    ${coal}{slot:13},
    ${lapis}{slot:14},   ${diamond}{slot:15}, ${emerald}{slot:16}
  ] },
  { delay: 1, clear: false, items: [
    ${emerald}{slot:10}, ${ruby}{slot:11},    ${gold}{slot:12},    ${iron}{slot:13},
    ${coal}{slot:14},    ${lapis}{slot:15},   ${diamond}{slot:16}
  ] },
  { delay: 1, clear: false, items: [
    ${diamond}{slot:10}, ${emerald}{slot:11}, ${ruby}{slot:12}, ${gold}{slot:13},
    ${iron}{slot:14},    ${coal}{slot:15},    ${lapis}{slot:16}
  ] }
]

items: [
  ${border} { slot: 0 },
  ${border} { slot: 1 },
  ${border} { slot: 2 },
  ${border} { slot: 6 },
  ${border} { slot: 7 },
  ${border} { slot: 8 },
  ${border} { slot: 9 },
  ${border} { slot: 17 },
  ${border} { slot: 18 },
  ${border} { slot: 19 },
  ${border} { slot: 20 },
  ${closeButton} { slot: 22 },
  ${border} { slot: 24 },
  ${border} { slot: 25 },
  ${border} { slot: 26 }
]
