#
# Bench F — items gated by show-rules & minor-rules.
# Every refresh runs every rule check (permission, level, money, world,
# placeholder if-conditions). Useful for measuring rule dispatch cost.
#
# Open: /am open bench_complex_rules
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&6Bench F — Rule-gated content"
size: 5
updateInterval: 20

activators {
  command: "bench_complex_rules"
}

items: [
  # Permission-gated tiles (one per group)
  {
    slot: 0
    material: IRON_BLOCK
    name: "&fДоступ default"
    lore: ["&7Видно всем"]
    rules { permission: "abstractmenus.bench.default" }
  },
  {
    slot: 1
    material: GOLD_BLOCK
    name: "&6Доступ vip"
    lore: ["&7Только для vip"]
    rules { permission: "group.vip" }
  },
  {
    slot: 2
    material: DIAMOND_BLOCK
    name: "&bДоступ premium"
    lore: ["&7Только для premium"]
    rules { permission: "group.premium" }
  },
  {
    slot: 3
    material: EMERALD_BLOCK
    name: "&aДоступ mvp"
    lore: ["&7Только для mvp"]
    rules { permission: "group.mvp" }
  },
  {
    slot: 4
    material: NETHERITE_BLOCK
    name: "&8Доступ admin"
    lore: ["&7Только для admin"]
    rules { permission: "group.admin" }
  },
  # Level / money / xp rules — single-value threshold (>= level / >= money / ...)
  {
    slot: 9
    material: EXPERIENCE_BOTTLE
    name: "&aLvl 5+"
    lore: ["&7Открыто с 5 уровня"]
    rules { level: 5 }
  },
  {
    slot: 10
    material: EXPERIENCE_BOTTLE
    name: "&aLvl 10+"
    lore: ["&7Только при &e10&7+ уровне"]
    rules { level: 10 }
  },
  {
    slot: 11
    material: GOLD_INGOT
    name: "&6Money 100+"
    lore: ["&7Нужно &e100&7+ монет"]
    rules { money: 100 }
  },
  {
    slot: 12
    material: HEART_OF_THE_SEA
    name: "&cFull HP"
    lore: ["&7Открыто на 20 HP"]
    rules { health: 20.0 }
  },
  {
    slot: 13
    material: COOKED_BEEF
    name: "&6Food 10+"
    lore: ["&7Открыто при сытости &e10&7+"]
    rules { foodLevel: 10 }
  },
  {
    slot: 14
    material: GRASS_BLOCK
    name: "&aOverworld"
    lore: ["&7Только в обычном мире"]
    rules { world: ["world"] }
  },

  # Compound rules (and / or / oneof / chance)
  {
    slot: 18
    material: CHEST
    name: "&fAnd combo"
    lore: ["&7permission AND level >= 5"]
    rules {
      and: [
        { permission: "abstractmenus.bench.default" }
        { level: 5 }
      ]
    }
  },
  {
    slot: 19
    material: ENDER_CHEST
    name: "&dOr combo"
    lore: ["&7vip OR money>=500"]
    rules {
      or: [
        { permission: "group.vip" }
        { money: 500 }
      ]
    }
  },
  {
    slot: 20
    material: SHULKER_BOX
    name: "&5OneOf combo"
    lore: ["&7Один из 3 пермов"]
    rules {
      oneof: [
        { permission: "group.vip" }
        { permission: "group.premium" }
        { permission: "group.mvp" }
      ]
    }
  },
  {
    slot: 21
    material: SUNFLOWER
    name: "&eRandom 25%"
    lore: ["&7Шанс показать на каждом refresh"]
    rules { chance: 25 }
  },
  {
    slot: 22
    material: SUNFLOWER
    name: "&eRandom 50%"
    lore: ["&7Шанс показать на каждом refresh"]
    rules { chance: 50 }
  },

  # If-rules with placeholder expressions.
  # NOTE: %player_*% placeholders require PAPI's Player expansion — without
  # it (`/papi ecloud download Player`), these expressions stay as literal
  # text and BooleanEvaluator throws NPE on the unresolved "%...%" tokens.
  # For the benchmark itself (which just measures rule dispatch cost) we use
  # AbstractMenus-built-in %var_*% placeholders, which resolve without any
  # ecloud dep. Set them first with /var set bench_gate 1  (see README).
  {
    slot: 27
    material: APPLE
    name: "&aif: 1 > 0 (const true)"
    lore: ["&7Простое const-условие"]
    rules { if: "1 > 0" }
  },
  {
    slot: 28
    material: COOKED_BEEF
    name: "&aif: var_bench_gate >= 1"
    lore: ["&7Global var check — set via /var set bench_gate 1"]
    rules { if: "%var_bench_gate% >= 1" }
  },
  {
    slot: 29
    material: BREAD
    name: "&aif: двойное AND"
    lore: ["&7Композиция if-условий"]
    rules {
      if: [
        "1 < 999"
        "5 > 2"
      ]
    }
  },
  {
    slot: 30
    material: WRITTEN_BOOK
    name: "&fName starts with B (param/contains)"
    lore: ["&7String contains rule on literal"]
    rules {
      if: {
        param: "Benchmark"
        contains: "B"
      }
    }
  },

  # Bottom row close
  ${closeButton} { slot: 40 }
]
