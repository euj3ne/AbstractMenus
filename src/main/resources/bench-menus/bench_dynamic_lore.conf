#
# Bench B — every item has %placeholder% in name AND lore.
# Forces the dynamic apply path on every refresh: pre-compute is disabled
# because hasPlaceholder('%') is true, so PropName/PropLore must call
# Handlers.replace + MiniMessageUtil.parseToLegacy on every render.
#
# Use this with /am open bench_dynamic_lore + low updateInterval to measure
# the post-rewrite cost of the dynamic path.
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&6Bench B — &e%player_name%&6's dashboard"
size: 4
updateInterval: 10

items: [
  {
    slot: 0
    material: PLAYER_HEAD
    skullOwner: "%player_name%"
    name: "&6%player_name%"
    lore: [
      "&7UUID: &f%player_uuid%"
      "&7Мир: &b%player_world%"
      "&7X: &a%player_x% &7Y: &a%player_y% &7Z: &a%player_z%"
      "&7Биом: &d%player_biome%"
      "&7Игровой режим: &e%player_gamemode%"
    ]
  },
  {
    slot: 1
    material: APPLE
    name: "&cЗдоровье &7• &f%player_health% / %player_max_health%"
    lore: [
      "&7Текущее здоровье"
      "&cHP: &f%player_health%"
      "&cMax: &f%player_max_health%"
    ]
  },
  {
    slot: 2
    material: COOKED_BEEF
    name: "&6Сытость &7• &f%player_food_level% / 20"
    lore: [
      "&7Уровень голода"
      "&6Food: &f%player_food_level%"
      "&6Saturation: &f%player_saturation%"
    ]
  },
  {
    slot: 3
    material: EXPERIENCE_BOTTLE
    name: "&aОпыт &7• &fLvl %player_level%"
    lore: [
      "&7Опыт игрока"
      "&aУровень: &f%player_level%"
      "&aПрогресс: &f%player_exp%"
      "&aДо след. уровня: &f%player_exp_to_level%"
    ]
  },

  {
    slot: 9
    material: GOLD_INGOT
    name: "&6Баланс &7• &e%vault_eco_balance%"
    lore: [
      "&7Доступные средства"
      "&6Сумма: &e%vault_eco_balance%"
      "&6В банке: &e%vault_eco_balance_fixed%"
    ]
  },
  {
    slot: 10
    material: NAME_TAG
    name: "&dГруппа &7• %vault_prefix%%player_name%"
    lore: [
      "&7Permission группа"
      "&dPrefix: &f%vault_prefix%"
      "&dGroup: &f%vault_group%"
    ]
  },
  {
    slot: 11
    material: CLOCK
    # %server_time_<format>% accepts a DateTimeFormatter pattern after the
    # underscore — must be a valid pattern string, NOT a word like "date".
    name: "&fВремя &7• %server_time_HH:mm:ss%"
    lore: [
      "&7Серверное время"
      "&fДата: &e%server_time_dd.MM.yyyy%"
      "&fTPS (1m): &b%server_tps_1%"
    ]
  },
  {
    slot: 12
    material: PAPER
    name: "&aОнлайн &7• &f%server_online% / %server_max_players%"
    lore: [
      "&7Текущий онлайн"
      "&fИграют сейчас: &a%server_online%"
      "&fМаксимум: &c%server_max_players%"
    ]
  },

  {
    slot: 18
    material: COMPASS
    name: "&bЛокация &7• &f%player_world%"
    lore: [
      "&7Direction: &f%player_direction%"
      "&7Координаты: &a%player_x% %player_y% %player_z%"
      "&7Биом: &d%player_biome%"
      "&7Свет: &e%player_light_level%"
    ]
  },
  {
    slot: 19
    material: CLOCK
    name: "&dВремя в мире &7• %player_world_time%"
    lore: [
      "&7Время на сервере"
      "&dGame day: &f%player_world_day%"
      "&dWeather: &f%player_world_weather%"
    ]
  },
  {
    slot: 20
    material: BOOK
    name: "&fСтатистика &7• &e%player_name%"
    lore: [
      "&7Walked: &a%player_statistic_walk_one_cm%"
      "&7Killed: &c%player_statistic_player_kills%"
      "&7Deaths: &4%player_statistic_deaths%"
      "&7Played: &b%player_statistic_play_one_minute%"
    ]
  },

  ${closeButton} { slot: 31 }
]
