#
# Bench D — GeneratedMenu over the online players catalog with pagination.
# Stresses the GeneratedMenu refresh path: catalog snapshot iteration, matrix
# layout, per-page rebuild, click-context dispatch.
#
# Open: /am open bench_generated_pagination
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&6Bench D — Online players (%player_name%)"
size: 6
updateInterval: 40

activators {
  command: "bench_generated_pagination"
}

catalog {
  type: players
}

matrix {
  cells: [
    "_________"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_________"
  ]
  templates {
    "x" {
      material: PLAYER_HEAD
      skullOwner: "%ctg_player_name%"
      name: "&e%ctg_player_name%"
      lore: [
        "&7Group: &f%ctg_vault_prefix%"
        "&7World: &f%ctg_player_world%"
        "&7Health: &c%ctg_player_health% &7/ &c%ctg_player_max_health%"
        "&7Level: &a%ctg_player_level%"
        ""
        "&aLeft click — teleport"
        "&cRight click — send message"
      ]
      click {
        left {
          command {
            player: ["tpa %ctg_player_name%"]
          }
          closeMenu: true
          sound: ${successSound}
        }
        right {
          command {
            player: ["msg %ctg_player_name% Hi from menu!"]
          }
          sound: ${clickSound}
        }
      }
    }
  }
}

items: [
  ${borderBlue} { slot: 0 },
  ${borderBlue} { slot: 8 },
  ${borderBlue} { slot: 45 },
  ${borderBlue} { slot: 53 },

  {
    slot: 48
    material: ARROW
    name: "&aPrevious page"
    lore: ["&7Current: &e%ctg_page%&7/&e%ctg_pages%"]
    click { pagePrev: 1, sound: ${clickSound} }
  },
  ${closeButton} { slot: 49 },
  {
    slot: 50
    material: ARROW
    name: "&aNext page"
    lore: ["&7Current: &e%ctg_page%&7/&e%ctg_pages%"]
    click { pageNext: 1, sound: ${clickSound} }
  }
]
