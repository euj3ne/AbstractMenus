#
# Bench H — small menu, 1-tick refresh.
# Stresses MenuManager.UpdateTask end-to-end at maximum frequency.
# After the Player-cache fix, no Bukkit.getPlayer(uuid) per tick.
#
# Open: /am open bench_high_refresh
# Combine with /spark profiler open to see hot frames.
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&cBench H — 1-tick refresh"
size: 1
updateInterval: 1

activators {
  command: "bench_high_refresh"
}

items: [
  {
    slot: 0
    material: CLOCK
    name: "&fTPS-ticker"
    lore: [
      "&7HP: &c%player_health%"
      "&7Food: &6%player_food_level%"
      "&7Pos: &a%player_x% %player_y% %player_z%"
    ]
  },
  {
    slot: 1
    material: APPLE
    name: "&cHP &7• &f%player_health%"
  },
  {
    slot: 2
    material: COOKED_BEEF
    name: "&6Food &7• &f%player_food_level%"
  },
  {
    slot: 3
    material: EXPERIENCE_BOTTLE
    name: "&aLvl &7• &f%player_level%"
  },
  {
    slot: 4
    material: GOLD_INGOT
    name: "&6Bal &7• &e%vault_eco_balance%"
  },
  {
    slot: 5
    material: PAPER
    name: "&fOnline &7• &a%server_online%"
  },
  {
    slot: 6
    material: COMPASS
    name: "&bWorld &7• &f%player_world%"
  },
  {
    slot: 7
    material: ITEM_FRAME
    name: "&dЗакрыть"
    click { closeMenu: true }
  },
  {
    slot: 8
    material: BARRIER
    name: "&cСтоп refresh"
    lore: ["&7Закрывает меню — снижает нагрузку UpdateTask"]
    click {
      closeMenu: true
      message: "&aRefresh стоп — меню закрыто"
    }
  }
]
