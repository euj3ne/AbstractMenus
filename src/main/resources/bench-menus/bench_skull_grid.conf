#
# Bench E — heavy skull rendering with a mix of texture sources.
# Stresses Skulls.skullCache (raw textures) and Skulls.playerSkullCache
# (live player skins). After the cache fix, repeated refreshes should hit
# the cache and skip Bukkit.createProfile + profile copy.
#
# Open: /am open bench_skull_grid
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&8Bench E — Skull grid"
size: 6
updateInterval: 20

activators {
  command: "bench_skull_grid"
}

# Static texture skulls — these all hit the texture cache after warmup.
arrowLeft  = "bd69e06e5dadfd84e5f3d1c21063f2553b2fa945ee1d4d7152fdc5425bc12a9"
arrowRight = "ad73cf66d31b83cd8b8644c15958c1b73c8d97323b801170c1d8864bb6a846d1"
xClose     = "5a6787ba32564e7c2f3a0ce64498ecbb23b89845e5a66b5cec7736f729ed37"
moneyHead  = "a9b906b2155f193787042338d05f840391c05a6d3e81623901b296bee3ffdd2"
