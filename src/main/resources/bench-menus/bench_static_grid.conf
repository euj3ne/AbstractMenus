#
# Bench A — fully-static 54-slot grid.
# Stresses the PropName/PropLore static pre-compute path: every name and every
# lore line is constant (no %placeholder%), so all 54 items should hit the
# cached parseToLegacy result and skip Handlers.replace + MiniMessage entirely.
#
# Open: /am open bench_static_grid
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

