#
# Bench J — variable read/write workout.
# Demonstrates global vars (var_) and personal vars (varp_) in lore + click
# actions. Stresses VariableManagerImpl.key() and the cache map.
#
# Open: /am open bench_variables
#

include required(file("./plugins/AbstractMenus/menus/_templates.conf"))

title: "&dBench J — Variables"
size: 3

activators {
  command: "bench_variables"
}

items: [
  # Counters — personal
  {
    slot: 0
    material: PAPER
    name: "&fPersonal counter &7• &e%varp_counter%"
    lore: [
      "&7click — increment"
      "&7shift+click — reset"
    ]
    click {
      left {
        incVarp: ["counter::1"]
        refreshItem: true
      }
      shift_left {
        removeVarp: ["counter"]
        refreshItem: true
      }
    }
  },
  {
    slot: 1
    material: PAPER
    name: "&fBonus points &7• &e%varp_points%"
    lore: ["&7click — +5", "&7right — -5"]
    click {
      left  { incVarp: ["points::5"], refreshItem: true }
      right { decVarp: ["points::5"], refreshItem: true }
    }
  },

  # Calculator — multiply / divide
  {
    slot: 2
    material: REDSTONE
    name: "&cMultiplier &7• &e%varp_mult%"
    lore: ["&7click — ×2", "&7right — ÷2"]
    click {
      left  { mulVarp: ["mult::2"], refreshItem: true }
      right { divVarp: ["mult::2"], refreshItem: true }
    }
  },

  # Global counters — visible to all
  {
    slot: 9
    material: GOLD_INGOT
    name: "&6Global treasury &7• &e%var_treasury%"
    lore: ["&7click — deposit +100"]
    click {
      incVar: ["treasury::100"]
      refreshItem: true
      sound: ${successSound}
    }
  },
  {
    slot: 10
    material: DIAMOND
    name: "&bDiamonds in shared pot &7• &b%var_diamonds%"
    lore: ["&7click — +1"]
    click {
      incVar: ["diamonds::1"]
      refreshItem: true
    }
  },

  # Read with default — exists check
  {
    slot: 11
    material: BOOK
    name: "&7Visited %varp_name%"
    lore: [
      "&7Set the varp 'name' from here:"
      "&7click — set to 'Player_%player_name%'"
    ]
    click {
      setVarp: [{ name: "name", value: "Player_%player_name%" }]
      refreshItem: true
    }
  },

  # Item only visible if var exists
  {
    slot: 18
    material: EMERALD
    name: "&aGift"
    lore: ["&7Visible when varp 'unlocked' exists"]
    rules {
      existVarp: "unlocked"
    }
  },
  {
    slot: 19
    material: PAPER
    name: "&fUnlock gift"
    lore: ["&7click — sets varp 'unlocked' = 1"]
    click {
      setVarp: ["unlocked::1"]
      refreshMenu: true
      message: "&aGift unlocked"
    }
  },
  {
    slot: 20
    material: BARRIER
    name: "&cReset gift"
    click {
      removeVarp: ["unlocked"]
      refreshMenu: true
      message: "&7Reset"
    }
  },

  ${closeButton} { slot: 22 }
]
